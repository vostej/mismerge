name: Code lint, check and test

on: [push, pull_request]

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check workflow files
        uses: raven-actions/actionlint@v2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependendencies
        run: npm i

      - name: Build project
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run check
        run: npm run check

      - name: Run tests
        run: npm run test
