name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependendencies
        run: npm i

      - name: Build project
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run check
        run: npm run check

      - name: Run tests
        run: npm run test

  release:
    needs: test
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      issues: write
      pull-requests: write
      contents: write
      packages: write
      attestations: write
      workflows: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@vostej'
          cache: 'npm'

      - name: Install dependendencies
        run: npm i

      - name: Build projects
        run: npm run build

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      - name: Pack packages for attestation
        run: |
          mkdir -p ./packed
          cd packages/core && npm pack --pack-destination ../../packed && cd ../..
          cd packages/adapter-react && npm pack --pack-destination ../../packed && cd ../..
          cd packages/adapter-solid && npm pack --pack-destination ../../packed && cd ../..

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: './packed/*.tgz'

      - name: Release
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
